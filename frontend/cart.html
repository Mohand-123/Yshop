<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panier — YSHOP3</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Y<span>SHOP</span>3</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Catalogue</a>
        <a href="favorites.html" class="nav-link">Favoris <span class="badge" id="badge-favoris">0</span></a>
        <a href="cart.html" class="nav-link active">Panier <span class="badge" id="badge-panier">0</span></a>
      </nav>
    </div>
  </header>

  <main class="page-layout">
    <h1 class="page-title">Mon Panier</h1>

    <div class="cart-layout">
      <div class="cart-items" id="cart-items">
        <p class="empty-msg">Votre panier est vide.</p>
      </div>

      <div class="cart-summary">
        <h2 class="summary-title">Récapitulatif</h2>
        <div class="summary-line">
          <span>Sous-total</span>
          <span id="cart-sous-total">0 €</span>
        </div>
        <div class="summary-line">
          <span>Livraison</span>
          <span>Gratuite</span>
        </div>
        <div class="summary-line total">
          <span>Total</span>
          <span id="cart-total">0 €</span>
        </div>
        <button class="btn-checkout" id="btn-checkout">Commander</button>
        <a href="index.html" class="btn-continue">Continuer mes achats</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2024 YSHOP3 — Tous droits réservés</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
